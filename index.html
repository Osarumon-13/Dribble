<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Landing Page</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

	<header>
		<div class="logo">
			Dribble
		</div>

		<nav>
			
			<ul>
				
				<li>Explore</li>
				<li>Hire Talent</li>
				<li>Get Hired</li>
				<li>Community</li>

			</ul>

		</nav>

		<div class="buttons">
			<a href="#">Sign Up</a>
			<button>Log In</button>
		</div>
	</header>

	<section class="hero">
		<div class="left">
			<span class="badge">HIRE TALENT</span>
			<h1>
				Work with the world's
				<br>
				best in <span>brand design</span>
			</h1>
			<ul>
				<li>Create your brief and recieve proposals.</li>
				<li>Browse real-world design work.</li>
				<li>Hire talented freelancers.</li>
			</ul>
			<button class="start">Start Your Project Brief</button>
		</div>
		<div class="right">
			<img src="images/hero.jpg">
		</div>

	</section>

	<section class="categories">
		<div>Stories</div>
		<div>Designers</div>
		<div>Services</div>
	</section>
	<div class="search">
		<input type="text" placeholder="What type of design are you interested in?">
		<button>Search</button>
	</div>

	<script src="script.js"></script>

</body>
</html>
